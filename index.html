<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Portal Nebuloso ⚡</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
    background-image:url('Correto.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:white;
    min-height:100vh;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:0;
}

#loginScreen{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:2;
}

.container{
    position:relative;
    z-index:1;
    width:95%;
    max-width:900px;
    margin:auto;
    padding:20px;
    display:none; /* começa bloqueado */
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.tabs button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1c2333;
    color:white;
    transition:.3s;
}

.tabs button:hover{
    background:#00ffff;
    color:black;
    transform:scale(1.05);
}

.tabs button.ativo{
    background:#00ffff;
    color:black;
    box-shadow:0 0 25px #00ffff;
}

.pagina{display:none;}
.pagina.ativa{display:block;}

.hero{text-align:center;margin-bottom:20px;}
.hero h1{color:#00ffff;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:#151c2b;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{color:#00ffff;}

#loginGoogle{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00ffff;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <button id="loginGoogle" onclick="loginGoogle()">
    🔵 Entrar com Google
  </button>
</div>

<!-- SITE -->
<div class="container" id="site">

<div class="tabs">
<button onclick="mostrar(event,'inicio')">🏠 Início</button>
<button onclick="mostrar(event,'mods')">🛒 Mods</button>
<button onclick="mostrar(event,'discord')">🎮 Discord</button>
<button onclick="mostrar(event,'feedback')">💬 Feedback</button>
</div>

<section id="inicio" class="pagina ativa">
<h1 style="text-align:center;color:#00ffff;">Portal Nebuloso</h1>
<p style="text-align:center;">Bem-vindo ao site 🔥</p>
</section>

<section id="mods" class="pagina">
<h2 style="text-align:center;">Mods</h2>
</section>

<section id="discord" class="pagina">
<h2 style="text-align:center;">Discord</h2>
</section>

<section id="feedback" class="pagina">
<h2 style="text-align:center;">Feedback</h2>
</section>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEa3uN9x4hUMt02DkHIsnyPSmWO9caIzE",
  authDomain: "portal-nebuloso.firebaseapp.com",
  projectId: "portal-nebuloso",
  storageBucket: "portal-nebuloso.firebasestorage.app",
  messagingSenderId: "755593713969",
  appId: "1:755593713969:web:0c3a45cb65061d1457f810",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.loginGoogle = async function () {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert(e.message);
  }
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("site").style.display = "block";
  } else {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("site").style.display = "none";
  }
});

</script>

<script>
function mostrar(event,id){
document.querySelectorAll('.pagina').forEach(p=>p.classList.remove('ativa'));
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('ativo'));
document.getElementById(id).classList.add('ativa');
event.currentTarget.classList.add('ativo');
}
</script>

</body>
</html>
