<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Portal Nebuloso ⚡</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
    background-image:url('Correto.png');
    background-size:cover;
    background-position:center;
    color:white;
    min-height:100vh;
}

/* fundo escuro */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
}

/* LOGIN */
#loginScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    z-index:9999;
}

/* SITE (começa escondido) */
#site{
    display:none;
    position:relative;
    z-index:1;
    width:95%;
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* botão login */
#loginGoogle{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00ffff;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
    <h2>🔐 Entrar no Portal Nebuloso</h2>

    <button id="loginGoogle" onclick="loginGoogle()">
        🔵 Entrar com Google
    </button>
</div>

<!-- SITE -->
<div id="site">

    <h1 style="text-align:center;color:#00ffff;">Portal Nebuloso</h1>

    <div style="text-align:center;margin-top:20px;">
        <a href="https://nebuloso-mods.github.io/nebula-downlods/" style="color:#00ffff;">
            Acessar site
        </a>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEa3uN9x4hUMt02DkHIsnyPSmWO9caIzE",
  authDomain: "portal-nebuloso.firebaseapp.com",
  projectId: "portal-nebuloso",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.loginGoogle = async function(){
    await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, (user) => {
    if(user){
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("site").style.display = "block";
    } else {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("site").style.display = "none";
    }
});
</script>

</body>
</html>
